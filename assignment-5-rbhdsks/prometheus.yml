global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["localhost:9093"]

scrape_configs:
  - job_name: "captioning_app"
    static_configs:
      - targets: ["localhost:8001"]

  - job_name: "node_exporter"
    static_configs:
      - targets: ["localhost:9100"]